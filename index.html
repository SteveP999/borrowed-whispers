<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Borrowed Whispers | Hello Texas Records</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg:#070604; --panel:#14100b; --panel2:#20180f; --gold:#d6a12b; --gold2:#f0c66b;
  --cream:#f7f0e4; --muted:#b9aa90; --line:rgba(214,161,43,.28); --shadow:rgba(0,0,0,.58);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:radial-gradient(circle at 70% 12%, rgba(214,161,43,.12), transparent 34%), linear-gradient(180deg,#050403 0%,#0b0906 46%,#060504 100%);
  color:var(--cream);
  font-family:Arial, Helvetica, sans-serif;
}
a{color:inherit}
header{
  position:sticky; top:0; z-index:20; display:flex; justify-content:space-between; align-items:center;
  padding:18px 30px; background:rgba(7,6,4,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
}
.brand{color:var(--gold); letter-spacing:.22em; text-transform:uppercase; font-weight:900; font-size:.84rem}
nav a{margin-left:24px; text-decoration:none; color:var(--muted); text-transform:uppercase; letter-spacing:.16em; font-size:.78rem; font-weight:800}
main{max-width:1220px; margin:0 auto; padding:64px 24px 140px}
.hero{min-height:620px; display:grid; grid-template-columns:minmax(0,1fr) 420px; gap:54px; align-items:center}
.eyebrow{color:var(--gold); text-transform:uppercase; letter-spacing:.34em; font-size:.72rem; font-weight:900; margin-bottom:18px}
h1{margin:0 0 24px; font-size:clamp(4rem,8.5vw,7.8rem); line-height:.88; text-transform:uppercase; letter-spacing:.035em; text-shadow:0 14px 32px var(--shadow)}
.genre{color:var(--gold2); font-size:1.1rem; margin-bottom:18px}
.bio{max-width:760px; color:#ded2bd; line-height:1.65; font-size:1.02rem}
.actions{display:flex; gap:14px; flex-wrap:wrap; margin-top:32px}
button,.btn{border:1px solid var(--line); padding:14px 24px; background:rgba(0,0,0,.18); color:var(--cream); text-decoration:none; text-transform:uppercase; letter-spacing:.16em; font-weight:900; cursor:pointer; border-radius:999px}
.primary{background:var(--gold); color:#120d07; border-color:var(--gold)}
.hero-art{position:relative; min-height:420px; border-radius:30px; overflow:hidden; background:linear-gradient(145deg,var(--panel2),#0d0905); border:1px solid var(--line); box-shadow:0 30px 70px rgba(0,0,0,.42)}
.hero-art img{width:100%; height:100%; min-height:420px; object-fit:cover; display:block}
.hero-art:after{content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,.58))}
.hero-art-label{position:absolute; left:22px; right:22px; bottom:22px; z-index:2; color:var(--cream); font-weight:900; font-size:1.05rem; text-shadow:0 4px 16px #000}
section{margin-top:80px}
h2{font-size:2.2rem; text-transform:uppercase; letter-spacing:.14em; margin:0 0 24px}
.latest-card,.album{border:1px solid var(--line); background:linear-gradient(145deg,rgba(32,24,15,.92),rgba(12,9,6,.96)); border-radius:28px; padding:26px; box-shadow:0 24px 70px rgba(0,0,0,.28)}
.latest-inner{display:grid; grid-template-columns:210px 1fr; gap:30px; align-items:center}
.cover{width:100%; max-width:210px; aspect-ratio:1/1; object-fit:cover; background:#22190f; border:1px solid var(--line); border-radius:18px; box-shadow:0 18px 38px rgba(0,0,0,.35)}
.latest-title{font-size:2.1rem; margin:0 0 8px}
.track-list{display:grid; gap:14px; margin-top:18px}
.track{display:grid; grid-template-columns:74px 1fr auto; gap:16px; align-items:center; padding:14px; border:1px solid rgba(214,161,43,.16); border-radius:18px; background:rgba(0,0,0,.18)}
.track img{width:74px; height:74px; object-fit:cover; border-radius:12px}
.track-title{font-weight:900; font-size:1.02rem}
.track-meta{color:var(--muted); font-size:.92rem; margin-top:5px}
.video-pill{display:inline-block; border:1px solid var(--line); padding:9px 13px; border-radius:999px; color:var(--muted); font-size:.76rem; text-transform:uppercase; letter-spacing:.1em; text-decoration:none}
.bottom-player{position:fixed; left:0; right:0; bottom:0; z-index:50; background:rgba(7,6,4,.96); border-top:1px solid var(--line); display:none; grid-template-columns:58px 1fr auto; gap:14px; align-items:center; padding:12px 18px; backdrop-filter:blur(10px)}
.bottom-player.is-visible{display:grid}
.bottom-player img{width:58px; height:58px; object-fit:cover; border-radius:10px}
audio{width:min(420px,44vw)}
.empty{color:var(--muted); padding:22px; border:1px dashed var(--line); border-radius:18px}
@media(max-width:900px){
  .hero{grid-template-columns:1fr; min-height:auto}
  .hero-art{min-height:320px}
  .latest-inner{grid-template-columns:1fr}
  .track{grid-template-columns:64px 1fr}
  .track .video-wrap{grid-column:1/-1}
  nav{display:none}
}
</style>
</head>
<body>
<header><div class="brand">Hello Texas Records</div><nav><a href="#latest">Latest</a><a href="#albums">Albums</a><a href="#videos">Videos</a></nav></header>
<main>
<section class="hero">
  <div>
    <div class="eyebrow">Hello Texas Records Artist</div>
    <h1>Borrowed Whispers</h1>
    <div class="genre">70s-80s Soft Rock, Soul</div>
    <p class="bio">Borrowed Whispers is part of the Hello Texas Records roster.</p>
    <div class="actions"><button class="primary" onclick="playLatest()">Listen Now</button><a class="btn" href="https://hellotexasrecords.com">Label Home</a></div>
  </div>
  <div class="hero-art" id="hero-art"><img id="hero-cover" alt="Borrowed Whispers"><div class="hero-art-label" id="hero-label">Borrowed Whispers</div></div>
</section>
<section id="latest"><h2>Latest Release</h2><div id="latest-release" class="latest-card"></div></section>
<section id="albums"><h2>Albums</h2><div id="album-list"></div></section>
<section id="videos"><h2>Videos</h2><div id="video-list" class="track-list"></div></section>
</main>
<div id="bottom-player" class="bottom-player"><img id="player-cover" alt=""><div><div id="player-title" class="track-title"></div><div id="player-meta" class="track-meta"></div></div><audio id="audio" controls></audio></div>
<script id="artist-data" type="application/json">{"artist": {"id": "borrowed-whispers", "name": "Borrowed Whispers", "genre": "70s-80s Soft Rock, Soul", "bio": "Borrowed Whispers is part of the Hello Texas Records roster.", "labelRosterPhoto": "Roster Photos/borrowed-whispers-roster-photo.png"}, "latest": {"title": "Still Falling For You", "artist": "Borrowed Whispers", "album": "I Still Remember", "type": "Latest Single", "cover": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "image": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "audio": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "audioSrc": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "videos": []}, "songs": [{"id": "borrowed-whispers-still-falling-for-you", "num": "01", "title": "Still Falling For You", "artist": "Borrowed Whispers", "album": "I Still Remember", "albumCover": "images/covers/borrowed-whispers-i-still-remember-ALBUM-cover.png", "type": "single", "isLatest": true, "cover": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "audio": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "audioSrc": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "videos": [], "includeOnRadio": true, "includeOnHomepage": true, "explicit": false, "tags": []}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('artist-data').textContent);
function esc(value) { return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function songCover(song) { return song.cover || song.albumCover || ''; }
function videoMarkup(song) {
  const videos = Array.isArray(song.videos) ? song.videos : [];
  if (!videos.length) return '<span class="video-pill">Video Coming Soon</span>';
  const first = videos[0];
  const url = first.youtube || first.url || first.href || '';
  if (!url) return '<span class="video-pill">Video Coming Soon</span>';
  return `<a class="video-pill" target="_blank" rel="noreferrer" href="${esc(url)}">Watch Video</a>`;
}
function setHero() {
  const latest = DATA.songs.find(s => s.isLatest) || DATA.songs[0];
  const img = document.getElementById('hero-cover');
  const label = document.getElementById('hero-label');
  if (latest && (latest.albumCover || latest.cover)) {
    img.src = latest.albumCover || latest.cover;
    label.textContent = latest.album || latest.title || DATA.artist.name;
  } else {
    img.style.display = 'none';
    label.textContent = DATA.artist.name;
  }
}
function renderLatest() {
  const latest = DATA.songs.find(s => s.isLatest) || DATA.songs[0];
  const el = document.getElementById('latest-release');
  if (!latest) { el.innerHTML = '<p class="empty">New music coming soon.</p>'; return; }
  el.innerHTML = `<div class="latest-inner"><img class="cover" src="${esc(songCover(latest))}" alt="${esc(latest.title)}"><div><div class="eyebrow">${esc(latest.type || 'Latest Release')}</div><h3 class="latest-title">${esc(latest.title)}</h3><div class="track-meta">${esc(latest.album || '')}</div><div class="actions"><button class="primary" onclick="playSong('${esc(latest.id)}')">Play</button>${videoMarkup(latest)}</div></div></div>`;
}
function renderAlbums() {
  const albums = new Map();
  DATA.songs.forEach(song => { const album = song.album || 'Singles'; if (!albums.has(album)) albums.set(album, []); albums.get(album).push(song); });
  const list = document.getElementById('album-list');
  if (!DATA.songs.length) { list.innerHTML = '<p class="empty">Album tracks coming soon.</p>'; return; }
  list.innerHTML = Array.from(albums.entries()).map(([album, songs]) => `<article class="album"><h3>${esc(album)}</h3><div class="eyebrow">Album Tracks</div><div class="track-list">${songs.map(song => `<div class="track"><img src="${esc(songCover(song))}" alt="${esc(song.title)}"><div><div class="track-title">${esc(song.title)}</div><div class="track-meta">${esc(song.artist)} • ${esc(song.album)}</div></div><div class="video-wrap"><button onclick="playSong('${esc(song.id)}')">Play</button> ${videoMarkup(song)}</div></div>`).join('')}</div></article>`).join('');
}
function renderVideos() {
  const el = document.getElementById('video-list');
  if (!DATA.songs.length) { el.innerHTML = '<p class="empty">Videos coming soon.</p>'; return; }
  el.innerHTML = DATA.songs.map(song => `<div class="track"><img src="${esc(songCover(song))}" alt="${esc(song.title)}"><div><div class="track-title">${esc(song.title)}</div><div class="track-meta">${esc(song.album || '')}</div></div><div class="video-wrap">${videoMarkup(song)}</div></div>`).join('');
}
function playLatest() { const latest = DATA.songs.find(s => s.isLatest) || DATA.songs[0]; if (latest) playSong(latest.id); }
function playSong(id) {
  const song = DATA.songs.find(s => s.id === id);
  if (!song || !song.audio) return;
  document.getElementById('bottom-player').classList.add('is-visible');
  document.getElementById('player-cover').src = songCover(song);
  document.getElementById('player-cover').alt = song.title;
  document.getElementById('player-title').textContent = song.title;
  document.getElementById('player-meta').textContent = `${song.artist} • ${song.album || ''}`;
  const audio = document.getElementById('audio');
  audio.src = song.audio;
  audio.play();
}
setHero(); renderLatest(); renderAlbums(); renderVideos();
</script>
</body>
</html>
