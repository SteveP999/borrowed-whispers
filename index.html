<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Borrowed Whispers | Hello Texas Records</title>
<link rel="manifest" href="manifest.json">
<style>
:root { --bg:#090806; --panel:#16120d; --gold:#d49a25; --cream:#f4efe5; --muted:#b7a98f; --border:rgba(212,154,37,.28); }
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--cream); font-family:Arial, sans-serif; }
header { position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; padding:18px 28px; background:rgba(9,8,6,.94); border-bottom:1px solid var(--border); }
.brand { color:var(--gold); letter-spacing:.18em; text-transform:uppercase; font-weight:800; font-size:.85rem; }
nav a { margin-left:22px; text-decoration:none; color:var(--muted); text-transform:uppercase; letter-spacing:.16em; font-size:.78rem; }
main { max-width:1180px; margin:0 auto; padding:70px 24px 120px; }
.hero { display:grid; grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr); gap:56px; align-items:center; min-height:520px; }
.eyebrow { color:var(--gold); text-transform:uppercase; letter-spacing:.35em; font-size:.72rem; font-weight:800; margin-bottom:18px; }
h1 { font-size:clamp(3.4rem,8vw,7rem); line-height:.9; margin:0 0 24px; text-transform:uppercase; letter-spacing:.04em; }
.genre { color:var(--muted); font-size:1.15rem; margin-bottom:24px; }
.bio { max-width:720px; color:#d8cdbb; line-height:1.6; }
.hero-card { min-height:360px; border:1px solid var(--border); border-radius:28px; background:linear-gradient(145deg,var(--panel),#0d0a07); display:flex; align-items:center; justify-content:center; }
.actions { display:flex; gap:14px; flex-wrap:wrap; margin-top:32px; }
button,.btn { border:1px solid var(--border); padding:14px 24px; background:transparent; color:var(--cream); text-decoration:none; text-transform:uppercase; letter-spacing:.16em; font-weight:800; cursor:pointer; border-radius:999px; }
.primary { background:var(--gold); color:#130f09; border-color:var(--gold); }
section { margin-top:70px; }
h2 { font-size:2.2rem; text-transform:uppercase; letter-spacing:.12em; }
.latest-card,.album { border:1px solid var(--border); background:var(--panel); border-radius:24px; padding:24px; margin-top:20px; }
.latest-inner { display:grid; grid-template-columns:160px 1fr; gap:24px; align-items:center; }
.cover { width:160px; aspect-ratio:1/1; object-fit:cover; background:#221b12; border:1px solid var(--border); border-radius:14px; }
.track-list { display:grid; gap:14px; margin-top:20px; }
.track { display:grid; grid-template-columns:72px 1fr auto; gap:16px; align-items:center; padding:14px; border:1px solid rgba(212,154,37,.16); border-radius:16px; background:rgba(0,0,0,.16); }
.track img { width:72px; height:72px; object-fit:cover; border-radius:10px; }
.track-title { font-weight:800; }
.track-meta { color:var(--muted); font-size:.9rem; margin-top:4px; }
.video-pill { display:inline-block; border:1px solid var(--border); padding:8px 12px; border-radius:999px; color:var(--muted); font-size:.78rem; text-transform:uppercase; letter-spacing:.1em; }
.bottom-player { position:fixed; left:0; right:0; bottom:0; background:#090806; border-top:1px solid var(--border); display:none; grid-template-columns:56px 1fr auto; gap:12px; align-items:center; padding:12px 18px; z-index:20; }
.bottom-player.is-visible { display:grid; }
.bottom-player img { width:56px; height:56px; object-fit:cover; border-radius:8px; }
audio { width:min(420px,45vw); }
@media(max-width:800px) { .hero,.latest-inner { grid-template-columns:1fr; } .track { grid-template-columns:60px 1fr; } .track .video-wrap { grid-column:1/-1; } }
</style>
</head>
<body>
<header><div class="brand">Hello Texas Records</div><nav><a href="#latest">Latest</a><a href="#albums">Albums</a><a href="#videos">Videos</a></nav></header>
<main>
<section class="hero">
<div>
<div class="eyebrow">Hello Texas Records Artist</div>
<h1>Borrowed Whispers</h1>
<div class="genre">70s-80s Soft Rock, Soul</div>
<p class="bio">Borrowed Whispers is part of the Hello Texas Records roster.</p>
<div class="actions"><button class="primary" onclick="playLatest()">Listen Now</button><a class="btn" href="https://hellotexasrecords.com">Label Home</a></div>
</div>
<div class="hero-card"><span>Artist image managed on label roster</span></div>
</section>
<section id="latest"><h2>Latest Release</h2><div id="latest-release" class="latest-card"></div></section>
<section id="albums"><h2>Albums</h2><div id="album-list"></div></section>
<section id="videos"><h2>Videos</h2><div id="video-list" class="track-list"></div></section>
</main>
<div id="bottom-player" class="bottom-player"><img id="player-cover" alt=""><div><div id="player-title" class="track-title"></div><div id="player-meta" class="track-meta"></div></div><audio id="audio" controls></audio></div>
<script id="artist-data" type="application/json">{"artist": {"id": "borrowed-whispers", "name": "Borrowed Whispers", "genre": "70s-80s Soft Rock, Soul", "bio": "Borrowed Whispers is part of the Hello Texas Records roster.", "labelRosterPhoto": "Roster Photos/borrowed-whispers-roster-photo.png"}, "latest": {"title": "Still Falling For You", "artist": "Borrowed Whispers", "album": "I Still Remember", "type": "Latest Single", "cover": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "image": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "audio": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "audioSrc": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "videos": []}, "songs": [{"id": "borrowed-whispers-still-falling-for-you", "num": "01", "title": "Still Falling For You", "artist": "Borrowed Whispers", "album": "I Still Remember", "albumCover": "images/covers/borrowed-whispers-i-still-remember-ALBUM-cover.png", "type": "single", "isLatest": true, "cover": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "audio": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "audioSrc": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "videos": [], "includeOnRadio": true, "includeOnHomepage": true, "explicit": false, "tags": []}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('artist-data').textContent);
function esc(value) { return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function videoMarkup(song) {
  const videos = Array.isArray(song.videos) ? song.videos : [];
  if (!videos.length) return '<span class="video-pill">Video Coming Soon</span>';
  const first = videos[0];
  const url = first.youtube || first.url || first.href || '';
  if (!url) return '<span class="video-pill">Video Coming Soon</span>';
  return `<a class="video-pill" target="_blank" rel="noreferrer" href="${esc(url)}">Watch Video</a>`;
}
function songCover(song) { return song.cover || song.albumCover || ''; }
function renderLatest() {
  const latest = DATA.songs.find(s => s.isLatest) || DATA.songs[0];
  const el = document.getElementById('latest-release');
  if (!latest) { el.innerHTML = '<p class="track-meta">New music coming soon.</p>'; return; }
  el.innerHTML = `<div class="latest-inner"><img class="cover" src="${esc(songCover(latest))}" alt="${esc(latest.title)}"><div><div class="eyebrow">${esc(latest.type || 'Latest Release')}</div><h3>${esc(latest.title)}</h3><div class="track-meta">${esc(latest.album || '')}</div><div class="actions"><button class="primary" onclick="playSong('${esc(latest.id)}')">Play</button>${videoMarkup(latest)}</div></div></div>`;
}
function renderAlbums() {
  const albums = new Map();
  DATA.songs.forEach(song => { const album = song.album || 'Singles'; if (!albums.has(album)) albums.set(album, []); albums.get(album).push(song); });
  document.getElementById('album-list').innerHTML = Array.from(albums.entries()).map(([album, songs]) => `<article class="album"><h3>${esc(album)}</h3><div class="eyebrow">Album Tracks</div><div class="track-list">${songs.map(song => `<div class="track"><img src="${esc(songCover(song))}" alt="${esc(song.title)}"><div><div class="track-title">${esc(song.title)}</div><div class="track-meta">${esc(song.artist)} • ${esc(song.album)}</div></div><div class="video-wrap"><button onclick="playSong('${esc(song.id)}')">Play</button> ${videoMarkup(song)}</div></div>`).join('')}</div></article>`).join('');
}
function renderVideos() {
  document.getElementById('video-list').innerHTML = DATA.songs.map(song => `<div class="track"><img src="${esc(songCover(song))}" alt="${esc(song.title)}"><div><div class="track-title">${esc(song.title)}</div><div class="track-meta">${esc(song.album || '')}</div></div><div class="video-wrap">${videoMarkup(song)}</div></div>`).join('');
}
function playLatest() { const latest = DATA.songs.find(s => s.isLatest) || DATA.songs[0]; if (latest) playSong(latest.id); }
function playSong(id) {
  const song = DATA.songs.find(s => s.id === id);
  if (!song || !song.audio) return;
  document.getElementById('bottom-player').classList.add('is-visible');
  document.getElementById('player-cover').src = songCover(song);
  document.getElementById('player-cover').alt = song.title;
  document.getElementById('player-title').textContent = song.title;
  document.getElementById('player-meta').textContent = `${song.artist} • ${song.album || ''}`;
  const audio = document.getElementById('audio');
  audio.src = song.audio;
  audio.play();
}
renderLatest(); renderAlbums(); renderVideos();
</script>
</body>
</html>
