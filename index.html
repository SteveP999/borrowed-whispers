<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--black:#030508;--ink:#060B14;--deep:#080E1C;--mid:#0C1428;
--accent:#D4902A;--accent-lt:#EAB050;--cream:#E8E0D0;--muted:#505870;--white:#F4F0E8;
--accent-glow:color-mix(in srgb, var(--accent) 22%, transparent);
--line:color-mix(in srgb, var(--accent) 28%, transparent);
--radius:0px;
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--cream);font-family:'Barlow',sans-serif;font-weight:300;font-size:15px;line-height:1.75;overflow-x:hidden}
#topnav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:64px;background:transparent;border-bottom:1px solid transparent;transition:background .4s,border-color .4s}
#topnav.scrolled{background:color-mix(in srgb,var(--black) 94%, transparent);border-color:var(--line);backdrop-filter:blur(12px)}
.nav-logo{height:40px;width:auto;max-width:220px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.35)}
.nav-wordmark{font-family:'Anton',serif;color:var(--white);font-size:1.2rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--muted);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--accent-lt)}

.hero{position:relative;height:100vh;min-height:620px;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-image:url('images/artist/borrowed-whispers-hero.png');background-size:cover;background-position:center 28%;background-repeat:no-repeat;filter:brightness(.32) contrast(1.08)}
.hero-vignette{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.28) 0%,rgba(0,0,0,0) 35%,rgba(0,0,0,.82) 72%,rgba(0,0,0,.98) 100%),linear-gradient(to right,rgba(0,0,0,.7) 0%,transparent 58%)}
.hero-glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 45% at 72% 45%,var(--accent-glow) 0%,transparent 66%)}
.hero-content{position:relative;z-index:2;padding:0 3.5rem 5rem;max-width:640px}
.hero-logo-wrap{margin-bottom:1.4rem}
.hero-logo-wrap img{height:62px;width:auto;max-width:min(420px,86vw);object-fit:contain;mix-blend-mode:screen;filter:brightness(1.35)}
.hero-name{font-family:'Anton',serif;font-size:clamp(2.6rem,6vw,5.5rem);line-height:.96;color:var(--white);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.04em;text-shadow:0 18px 45px rgba(0,0,0,.6)}
.hero-label{font-family:'Barlow Condensed',sans-serif;font-size:.64rem;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:.9rem}
.hero-tagline{font-family:'Anton',serif;font-size:clamp(1.05rem,2vw,1.4rem);font-style:italic;color:var(--cream);opacity:.88;margin-bottom:2rem;line-height:1.62}
.hero-ctas{display:flex;gap:1rem;flex-wrap:wrap}
.cta-primary,.latest-play-btn,.track-play-btn,.video-btn{cursor:pointer}
.cta-primary{background:var(--accent);color:var(--black);border:none;padding:.82rem 2rem;font-family:'Barlow Condensed',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;transition:background .2s,transform .15s}
.cta-primary:hover{background:var(--accent-lt);transform:translateY(-1px)}
.cta-secondary{background:transparent;color:var(--cream);border:1px solid var(--line);padding:.82rem 2rem;text-decoration:none;display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:.76rem;letter-spacing:.16em;text-transform:uppercase;transition:border-color .2s,color .2s}
.cta-secondary:hover{border-color:var(--accent);color:var(--accent-lt)}

.section-header{text-align:center;padding:5rem 2rem 3.5rem}
.section-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.section-title{font-family:'Anton',serif;font-size:clamp(2rem,4vw,3rem);font-weight:400;color:var(--white);text-transform:uppercase}
.rule{width:48px;height:1px;background:var(--accent);margin:1.2rem auto 0;opacity:.65}

#bio{background:var(--ink);padding-bottom:5rem}
.bio-inner{max-width:700px;margin:0 auto;padding:0 2rem;text-align:center}
.bio-inner p{color:var(--muted);line-height:1.95;font-size:.98rem;margin-bottom:1.2rem}

#latest-single,#video-section{background:var(--mid);padding:5rem 0;border-top:1px solid var(--line)}
.latest-inner{max-width:1060px;margin:0 auto;padding:0 2.5rem;display:grid;grid-template-columns:380px 1fr;gap:4.5rem;align-items:center}
.latest-cover{width:100%;aspect-ratio:1;object-fit:cover;display:block;border-radius:var(--radius);box-shadow:0 0 50px var(--accent-glow),0 24px 64px rgba(0,0,0,.8)}
.latest-badge,.album-badge{font-family:'Barlow Condensed',sans-serif;display:inline-block;font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);border:1px solid var(--line);padding:.28rem .85rem;margin-bottom:1.2rem}
.latest-title{font-family:'Anton',serif;font-size:clamp(1.8rem,3.5vw,2.9rem);font-weight:400;color:var(--white);line-height:1.12;margin-bottom:.4rem;text-transform:uppercase}
.latest-sub,.album-artist{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem}
.latest-play-btn{display:inline-flex;align-items:center;gap:.75rem;background:transparent;color:var(--accent);border:1px solid var(--line);padding:.85rem 2rem;font-family:'Barlow Condensed',sans-serif;font-size:.76rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;transition:border-color .2s,background .2s}
.latest-play-btn:hover{background:var(--accent-glow)}

.video-wrap{max-width:900px;margin:0 auto;padding:0 2.5rem;text-align:center}
.video-panel{background:rgba(0,0,0,.18);border:1px solid var(--line);padding:2rem}
.video-thumb{position:relative;display:none;aspect-ratio:16/9;overflow:hidden;background:#000;box-shadow:0 24px 64px rgba(0,0,0,.55);cursor:pointer}
.video-thumb.has-video{display:block}
.video-thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.82);transition:filter .25s,transform .35s}
.video-thumb:hover img{filter:brightness(1);transform:scale(1.02)}
.video-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25)}
.video-play-circle{width:68px;height:68px;border-radius:50%;background:var(--accent);color:var(--black);display:flex;align-items:center;justify-content:center;font-size:1.35rem;padding-left:4px}
.video-coming-soon{display:none;color:var(--muted);font-size:.8rem;letter-spacing:.22em;text-transform:uppercase;padding:3rem 1rem;border:1px dashed var(--line)}
.video-coming-soon.visible{display:block}
.video-actions{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin-top:1.25rem}
.video-btn,.video-soon-btn{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;border:1px solid var(--line);padding:.35rem .75rem;color:var(--accent);background:transparent}
.video-soon-btn{opacity:.65;cursor:default}

.album-section{padding:5rem 0;border-top:1px solid var(--line)}
.album-section:nth-child(odd){background:var(--deep)}
.album-section:nth-child(even){background:var(--ink)}
.album-layout{max-width:1080px;margin:0 auto;padding:0 2.5rem;display:grid;grid-template-columns:340px 1fr;gap:4rem;align-items:start}
.album-layout.reverse{direction:rtl}
.album-layout.reverse>*{direction:ltr}
.album-cover{width:100%;aspect-ratio:1;object-fit:cover;display:block;border-radius:var(--radius);box-shadow:0 0 40px var(--accent-glow),0 20px 60px rgba(0,0,0,.75)}
.album-title{font-family:'Anton',serif;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:400;color:var(--white);line-height:1.15;margin-bottom:.4rem;text-transform:uppercase}
.tracklist{border-top:1px solid color-mix(in srgb,var(--accent) 12%, transparent)}
.track-row{display:grid;grid-template-columns:2rem 1fr auto auto;align-items:center;gap:.75rem;padding:.8rem 0;border-bottom:1px solid color-mix(in srgb,var(--accent) 7%, transparent);transition:background .2s}
.track-row:hover{background:color-mix(in srgb,var(--accent) 5%, transparent)}
.track-num{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;color:var(--muted);opacity:.45;text-align:right}
.track-title{font-size:.92rem;color:var(--cream)}
.track-badge{font-family:'Barlow Condensed',sans-serif;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;padding:.18rem .55rem;color:var(--accent);border:1px solid var(--line)}
.track-play-btn{background:transparent;border:1px solid var(--line);color:var(--accent);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;transition:background .2s,border-color .2s}
.track-play-btn:hover,.track-play-btn.playing{background:var(--accent-glow);border-color:var(--accent-lt)}

.album-track-art-block{grid-column:1/-1;margin-top:.25rem;padding-top:2rem;border-top:1px solid var(--line)}
.album-track-art-heading{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
.album-track-art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(272px,100%),272px));gap:1.35rem;align-items:start;justify-content:start}
.album-track-art-card{cursor:pointer}
.album-track-art-img-wrap{position:relative;overflow:hidden;aspect-ratio:1;background:var(--black)}
.album-track-art-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.84);transition:transform .35s,filter .35s}
.album-track-art-card:hover img{transform:scale(1.04);filter:brightness(1)}
.album-track-art-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .25s}
.album-track-art-card:hover .album-track-art-overlay{background:rgba(0,0,0,.35)}
.album-track-art-play{width:44px;height:44px;border:2px solid var(--accent);background:rgba(0,0,0,.68);color:var(--accent);font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:scale(.86);transition:opacity .25s,transform .25s}
.album-track-art-card:hover .album-track-art-play,.album-track-art-play.playing{opacity:1;transform:scale(1)}
.album-track-art-info{padding:.7rem 0 0}
.album-track-art-title{font-family:'Anton',serif;font-size:1rem;color:var(--white);line-height:1.15}
.album-track-art-sub{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.75;margin-top:.2rem}

.photo-strip{display:grid;grid-template-columns:repeat(3,1fr);height:360px;overflow:hidden;border-top:1px solid var(--line)}
.photo-strip img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.76) saturate(.88);transition:filter .4s,transform .5s}
.photo-strip img:hover{filter:brightness(1) saturate(1);transform:scale(1.03)}
.photo-strip img.missing{display:none}
.photo-strip.empty{display:none}

#player{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:color-mix(in srgb,var(--black) 97%, transparent);border-top:1px solid var(--line);backdrop-filter:blur(16px);grid-template-columns:auto 1fr auto;align-items:center;gap:1.5rem;padding:.8rem 2rem;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
#player.visible{display:grid;transform:translateY(0)}
.p-info{display:flex;align-items:center;gap:1rem;min-width:0}
.p-thumb{width:42px;height:42px;object-fit:cover;flex-shrink:0;border:1px solid var(--line)}
.p-title{font-family:'Anton',serif;font-size:1rem;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);opacity:.7}
.p-controls{display:flex;align-items:center;flex-direction:column;flex:1;gap:.5rem;min-width:0}
.p-btn-row{display:flex;align-items:center;gap:1.2rem}
.p-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:.25rem;transition:color .2s}
.p-btn:hover{color:var(--accent-lt)}
#p-playbtn{width:36px;height:36px;border:1px solid var(--line);background:transparent;color:var(--accent);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center}
.progress-wrap{height:4px;background:color-mix(in srgb,var(--accent) 14%, transparent);width:100%;max-width:520px;cursor:pointer}
.progress-fill{height:100%;width:0;background:linear-gradient(to right,var(--accent),var(--accent-lt))}
.p-extra{display:flex;align-items:center;gap:.8rem}
#volume{width:90px;accent-color:var(--accent)}

footer{background:var(--black);border-top:1px solid var(--line);padding:4rem 2rem 3rem;text-align:center}
.foot-logo{height:48px;width:auto;max-width:260px;object-fit:contain;opacity:.85;mix-blend-mode:screen}
.foot-text{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:1rem}

@media(max-width:800px){
  #topnav{padding:0 1.25rem}
  .nav-links{display:none}
  .hero-content{padding:0 1.5rem 4rem}
  .latest-inner,.album-layout{grid-template-columns:1fr}
  .album-layout.reverse{direction:ltr}
  .photo-strip{grid-template-columns:1fr;height:auto}
  .photo-strip img{height:340px}
  #player{grid-template-columns:1fr;padding:.9rem 1rem}
  .p-extra{display:none}
}
</style>
</head>
<body>
<nav id="topnav">
  <img class="nav-logo" src="images/logos/borrowed-whispers-logo.png" alt="Borrowed Whispers logo" onerror="this.style.display='none';document.getElementById('nav-wordmark').style.display='block';">

<script id="artist-data" type="application/json">{"artist": {"id": "borrowed-whispers", "name": "Borrowed Whispers", "genre": "70s-80s Soft Rock, Soul", "tagline": "Borrowed Whispers is part of the Hello Texas Records roster.", "bio": "Borrowed Whispers is part of the Hello Texas Records roster.", "theme": "night_rock", "logo": "images/logos/borrowed-whispers-logo.png", "hero": "images/artist/borrowed-whispers-hero.png", "photos": ["images/artist/borrowed-whispers-photo-1.png", "images/artist/borrowed-whispers-photo-2.png", "images/artist/borrowed-whispers-photo-3.png"]}, "latest": {"title": "Still Falling For You", "artist": "Borrowed Whispers", "album": "I Still Remember", "type": "Latest Single", "cover": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "image": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "audio": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "audioSrc": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "videos": []}, "songs": [{"id": "borrowed-whispers-still-falling-for-you", "num": "01", "title": "Still Falling For You", "artist": "Borrowed Whispers", "album": "I Still Remember", "albumCover": "images/covers/borrowed-whispers-i-still-remember-ALBUM-cover.png", "type": "single", "isLatest": true, "cover": "images/covers/borrowed-whispers-still-falling-for-you-cover.png", "audio": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "audioSrc": "https://www.dropbox.com/scl/fi/o8s2z0p87bo8zgl47k0da/Borrowed-Whispers-Still-Falling-for-You-H-O-Version-KEEPER.mp3?rlkey=wc4ww26y1yex5dj9g1bct8712&raw=1", "videos": [], "includeOnRadio": true, "includeOnHomepage": true, "explicit": false, "tags": []}], "hasVideoSection": true}</script>
<script>
const DATA = JSON.parse(document.getElementById('artist-data').textContent);
const SONGS = DATA.songs || [];
let currentIndex = -1;
const audio = document.getElementById('audio');

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
}
function songCover(song) { return song.cover || song.albumCover || ''; }
function videoUrl(song) {
  const videos = Array.isArray(song.videos) ? song.videos : [];
  if (!videos.length) return '';
  return videos[0].youtube || videos[0].url || videos[0].href || '';
}
function videoMarkup(song) {
  const url = videoUrl(song);
  if (!url) return '<span class="video-soon-btn">Video Coming Soon</span>';
  return `<a class="video-btn" target="_blank" rel="noreferrer" href="${esc(url)}">Watch Video</a>`;
}
function renderLatest() {
  const latest = SONGS.find(s => s.isLatest) || SONGS[0];
  const el = document.getElementById('latest-render');
  if (!latest) {
    el.innerHTML = '<div><div class="latest-badge">Latest Release</div><h2 class="latest-title">New Music Coming Soon</h2></div>';
    return;
  }
  el.innerHTML = `
    <img class="latest-cover" src="${esc(songCover(latest))}" alt="${esc(latest.title)}">
    <div>
      <div class="latest-badge">${esc(latest.type || 'Latest Release')}</div>
      <h2 class="latest-title">${esc(latest.title)}</h2>
      <div class="latest-sub">${esc(latest.album || '')}</div>
      <button class="latest-play-btn" onclick="playSongById('${esc(latest.id)}')">&#9654; Play</button>
      ${videoMarkup(latest)}
    </div>`;
}
function renderVideo() {
  const container = document.getElementById('video-render');
  if (!container) return;
  const song = SONGS.find(s => videoUrl(s)) || SONGS.find(s => s.isLatest) || SONGS[0];
  if (!song || !videoUrl(song)) {
    container.innerHTML = '<div class="video-coming-soon visible">Video Coming Soon</div>';
    return;
  }
  const thumb = song.cover || song.albumCover || '';
  container.innerHTML = `
    <div class="video-thumb has-video" onclick="window.open('${esc(videoUrl(song))}','_blank')">
      <img src="${esc(thumb)}" alt="${esc(song.title)} video">
      <div class="video-play-overlay"><div class="video-play-circle">&#9654;</div></div>
    </div>
    <div class="video-actions">${videoMarkup(song)}</div>`;
}
function renderAlbums() {
  const root = document.getElementById('albums');
  if (!SONGS.length) {
    root.innerHTML = '<section class="album-section"><div class="section-header"><div class="section-eyebrow">Music</div><h2 class="section-title">Music Coming Soon</h2><div class="rule"></div></div></section>';
    return;
  }
  const albums = new Map();
  SONGS.forEach(song => {
    const album = song.album || 'Singles';
    if (!albums.has(album)) albums.set(album, []);
    albums.get(album).push(song);
  });
  let html = '';
  Array.from(albums.entries()).forEach(([album, songs], idx) => {
    const cover = songs.find(s => s.albumCover)?.albumCover || songCover(songs[0]) || '';
    html += `
    <section class="album-section">
      <div class="album-layout ${idx % 2 ? 'reverse' : ''}">
        <img class="album-cover" src="${esc(cover)}" alt="${esc(album)}">
        <div>
          <div class="album-badge">Album</div>
          <h2 class="album-title">${esc(album)}</h2>
          <div class="album-artist">${esc(DATA.artist.name)}</div>
          <div class="tracklist">
            ${songs.map((song, i) => `
              <div class="track-row">
                <div class="track-num">${String(i+1).padStart(2,'0')}</div>
                <div class="track-title">${esc(song.title)}</div>
                <div>${song.isLatest ? '<span class="track-badge">Latest</span>' : ''}</div>
                <button class="track-play-btn" onclick="playSongById('${esc(song.id)}')">&#9654;</button>
              </div>`).join('')}
          </div>
        </div>
        <div class="album-track-art-block">
          <div class="album-track-art-heading">Album Tracks</div>
          <div class="album-track-art-grid">
            ${songs.map(song => `
              <div class="album-track-art-card" onclick="playSongById('${esc(song.id)}')">
                <div class="album-track-art-img-wrap">
                  <img src="${esc(songCover(song))}" alt="${esc(song.title)}">
                  <div class="album-track-art-overlay"><div class="album-track-art-play">&#9654;</div></div>
                </div>
                <div class="album-track-art-info">
                  <div class="album-track-art-title">${esc(song.title)}</div>
                  <div class="album-track-art-sub">${esc(song.album || '')}</div>
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </section>`;
  });
  root.innerHTML = html;
}
function playLatest() {
  const latest = SONGS.find(s => s.isLatest) || SONGS[0];
  if (latest) playSongById(latest.id);
}
function playSongById(id) {
  const idx = SONGS.findIndex(s => s.id === id);
  if (idx >= 0) playIndex(idx);
}
function playIndex(idx) {
  const song = SONGS[idx];
  if (!song || !(song.audio || song.audioSrc)) return;
  currentIndex = idx;
  audio.src = song.audio || song.audioSrc;
  document.getElementById('p-thumb').src = songCover(song);
  document.getElementById('p-title').textContent = song.title;
  document.getElementById('p-sub').textContent = `${song.artist || DATA.artist.name} • ${song.album || ''}`;
  document.getElementById('player').classList.add('visible');
  audio.play();
  document.getElementById('p-playbtn').innerHTML = '&#10074;&#10074;';
}
function togglePlay() {
  if (!audio.src) return playLatest();
  if (audio.paused) { audio.play(); document.getElementById('p-playbtn').innerHTML='&#10074;&#10074;'; }
  else { audio.pause(); document.getElementById('p-playbtn').innerHTML='&#9654;'; }
}
function nextTrack() { if (SONGS.length) playIndex((currentIndex + 1) % SONGS.length); }
function prevTrack() { if (SONGS.length) playIndex((currentIndex - 1 + SONGS.length) % SONGS.length); }
function seek(e) {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
});
audio.addEventListener('ended', nextTrack);
document.getElementById('volume').addEventListener('input', e => audio.volume = e.target.value);
window.addEventListener('scroll', () => document.getElementById('topnav').classList.toggle('scrolled', window.scrollY > 20));
function checkPhotoStrip() {
  const strip = document.getElementById('photo-strip');
  if ([...strip.querySelectorAll('img')].every(img => img.classList.contains('missing'))) strip.classList.add('empty');
}
renderLatest();
renderVideo();
renderAlbums();
</script>
</body>
</html>
